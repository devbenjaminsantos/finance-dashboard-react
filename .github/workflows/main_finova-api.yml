name: Build and deploy ASP.Net Core app to Azure Web App - finova-api

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/main_finova-api.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: finova-api
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: server/FinanceDashboard.Api/FinanceDashboard.Api.csproj
  PUBLISH_PATH: server/FinanceDashboard.Api/publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_PATH }}
